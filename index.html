<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content-to-Thread MVP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- External Script containing Tailwind Config and App Logic -->
    <script src="script.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Fallback background if Tailwind fails */
            background: linear-gradient(135deg, #0f172a, #1e293b);
            background-attachment: fixed;
            color: #f8fafc;
        }
        
        /* Glassmorphism Card Utility */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 0.75rem;
        }

        /* Custom scrollbar for thread preview */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.4);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 text-slate-100 font-sans antialiased p-6 md:p-12">
    
    <div class="max-w-5xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-3">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Threadify Pro
                </h1>
                <p class="text-slate-400 mt-1 text-sm" data-i18n="subtitle">SaaS d'entreprise : De contenu à Thread</p>
            </div>
            <nav class="flex items-center gap-3">
                <button id="lang-toggle" class="text-sm font-medium text-slate-300 hover:text-white transition-colors bg-white/5 border border-white/10 px-3 py-2 rounded-lg hover:bg-white/10">EN</button>
                <button class="text-sm font-medium text-slate-300 hover:text-white transition-colors bg-white/5 border border-white/10 px-4 py-2 rounded-lg hover:bg-white/10" data-i18n="dashboard">Tableau de bord</button>
            </nav>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left Column: Input -->
            <section class="space-y-6">
                <div class="glass-card p-6">
                    <h2 class="text-lg font-semibold text-white mb-4" data-i18n="inputTitle">Contenu source</h2>
                    <form id="content-form" class="space-y-5">
                        <div>
                            <label for="source-content" class="block text-sm font-medium text-slate-300 mb-2" data-i18n="inputLabel">Collez votre article, blog ou idées</label>
                            <textarea 
                                id="source-content" 
                                rows="10" 
                                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg p-4 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 placeholder-slate-500 resize-none transition-all"
                                placeholder="Ex : Ces dernières années, l'intelligence artificielle a fondamentalement transformé..."
                                data-i18n="inputPlaceholder"
                            ></textarea>
                        </div>
                        
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <span class="text-xs text-slate-400 font-medium" data-i18n="toneLabel">Ton :</span>
                                <select class="bg-slate-900/50 border border-slate-700/50 rounded-md text-xs text-slate-300 px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-500/50">
                                    <option data-i18n="toneProfessional">Professionnel</option>
                                    <option data-i18n="toneEngaging">Engageant</option>
                                    <option data-i18n="toneAnalytical">Analytique</option>
                                </select>
                            </div>
                            <span class="text-xs text-slate-500" data-i18n="wordLimit">Limite de ~2500 mots</span>
                        </div>
                        
                        <button type="submit" id="generate-btn" class="w-full py-3 px-4 rounded-lg font-semibold text-white bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-indigo-500 transition-all shadow-lg shadow-indigo-500/25 flex items-center justify-center gap-2">
                            <span id="generate-btn-text" data-i18n="generateBtn">Générer le Thread</span>
                        </button>
                    </form>
                </div>
            </section>

            <!-- Right Column: Output Preview -->
            <section class="space-y-6">
                <div class="glass-card p-6 h-full flex flex-col">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-semibold text-white" data-i18n="previewTitle">Aperçu du Thread</h2>
                        <button id="copy-btn" class="text-xs bg-slate-800/50 hover:bg-slate-700/50 text-slate-300 px-3 py-1.5 rounded-md border border-slate-700/50 transition-colors flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            <span id="copy-text" data-i18n="copyBtn">Copier le Thread</span>
                        </button>
                    </div>

                    <!-- Thread Items -->
                    <div id="thread-container" class="space-y-0 flex-1 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Empty initial state -->
                    </div>
                </div>
            </section>
        </main>
        
        <!-- Footer -->
        <footer class="pt-8 text-center border-t border-slate-800/50">
            <p class="text-xs text-slate-500 font-medium" data-i18n="footer">© 2024 Threadify Pro. Enterprise SaaS MVP.</p>
        </footer>
    </div>
</body>
</html>
