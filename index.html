<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadPro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- External Script containing Tailwind Config and App Logic -->
    <script src="script.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen font-sans antialiased p-6 md:p-12">
    
    <div class="max-w-5xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-3">
                    <i class="fas fa-brain e-tech-logo text-3xl"></i>
                    ThreadPro
                </h1>
                <p class="text-slate-400 mt-1 text-sm" data-i18n="subtitle">SaaS d'entreprise : De contenu à Thread</p>
            </div>
            <nav class="flex items-center gap-3">
                <button id="lang-toggle" class="text-sm font-medium text-slate-300 hover:text-white transition-colors bg-white/5 border border-white/10 px-3 py-2 rounded-lg hover:bg-white/10">EN</button>
                <button class="text-sm font-medium text-slate-300 hover:text-white transition-colors bg-white/5 border border-white/10 px-4 py-2 rounded-lg hover:bg-white/10" data-i18n="dashboard">Tableau de bord</button>
            </nav>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left Column: Input -->
            <section class="space-y-6">
                <div class="glass-card p-6">
                    <h2 class="text-lg font-semibold text-white mb-4" data-i18n="inputTitle">Contenu source</h2>
                    <form id="content-form" class="space-y-5">
                        <div>
                            <label for="source-content" class="block text-sm font-medium text-slate-300 mb-2" data-i18n="inputLabel">Collez votre article, blog ou idées</label>
                            <textarea 
                                id="source-content" 
                                rows="10" 
                                class="w-full custom-input rounded-lg p-4 text-sm focus:outline-none placeholder-slate-500 resize-none"
                                placeholder="Ex : Ces dernières années, l'intelligence artificielle a fondamentalement transformé..."
                                data-i18n="inputPlaceholder"
                            ></textarea>
                        </div>
                        
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <span class="text-xs text-slate-400 font-medium" data-i18n="toneLabel">Ton :</span>
                                <select class="custom-input rounded-md text-xs px-3 py-1.5 focus:outline-none">
                                    <option data-i18n="toneProfessional">Professionnel</option>
                                    <option data-i18n="toneEngaging">Engageant</option>
                                    <option data-i18n="toneAnalytical">Analytique</option>
                                </select>
                            </div>
                            <span class="text-xs text-slate-500" data-i18n="wordLimit">Limite de ~2500 mots</span>
                        </div>
                        
                        <button type="submit" id="generate-btn" class="w-full py-3 px-4 rounded-lg font-semibold text-white premium-btn flex items-center justify-center gap-2">
                            <span id="generate-btn-text" data-i18n="generateBtn">Générer le Thread</span>
                        </button>
                    </form>
                </div>
            </section>

            <!-- Right Column: Output Preview -->
            <section class="space-y-6">
                <div class="glass-card p-6 h-full flex flex-col">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-semibold text-white" data-i18n="previewTitle">Aperçu du Thread</h2>
                        <button id="copy-btn" class="text-xs bg-slate-800/50 hover:bg-slate-700/50 text-slate-300 px-3 py-1.5 rounded-md border border-slate-700/50 transition-colors flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            <span id="copy-text" data-i18n="copyBtn">Copier le Thread</span>
                        </button>
                    </div>

                    <!-- Thread Items -->
                    <div id="thread-container" class="space-y-0 flex-1 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Empty initial state -->
                    </div>
                </div>
            </section>
        </main>
        
        <!-- Footer -->
        <footer class="pt-8 text-center border-t border-slate-800/50">
            <p class="text-xs text-slate-500 font-medium" data-i18n="footer">© 2024 ThreadPro. Enterprise SaaS MVP.</p>
        </footer>
    </div>
</body>
</html>
